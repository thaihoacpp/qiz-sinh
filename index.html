<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Xáo Trộn</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .quiz-card { background: white; padding: 30px; border-radius: 12px; shadow: 0 8px 20px rgba(0,0,0,0.1); width: 90%; max-width: 550px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #1c1e21; text-align: left; line-height: 1.4; }
        .options { display: grid; gap: 12px; }
        .btn-option { padding: 14px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 1rem; text-align: left; }
        .btn-option:hover { background: #f8f9fa; border-color: #007bff; }
        .btn-option.correct { background: #28a745 !important; color: white; border-color: #28a745; }
        .btn-option.wrong { background: #dc3545 !important; color: white; border-color: #dc3545; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 24px; }
        #next-btn { margin-top: 20px; padding: 12px 30px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; display: none; font-weight: bold; }
        #result-screen { display: none; }
        .progress-bar { font-size: 0.9rem; color: #65676b; margin-bottom: 15px; text-align: right; }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-card">
    <div id="question-container">
        <div class="progress-bar" id="progress"></div>
        <div class="question" id="question-text">Đang chuẩn bị câu hỏi...</div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">Tiếp theo</button>
    </div>

    <div id="result-screen">
        <h2 style="color: #28a745;">Hoàn thành!</h2>
        <p id="score-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
        <button onclick="location.reload()" style="padding: 10px 25px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px;">Làm lại bài mới</button>
    </div>
</div>

<script>
    // DỮ LIỆU GỐC (Bạn có thể dán toàn bộ các câu từ 1-40 vào đây)
    const rawData = "Câu 1: Văn minh Đại Việt có cội nguồn từ nền văn minh|Văn Lang - Âu Lạc|Chăm - pa, Phù Nam|Đồng Đậu, Gò Tháp|Đông Sơn, Sa Huỳnh|A#Câu 2: Dưới triều đại nhà Lê (thế kỉ XV), bộ luật thành văn nào sau đây được ban hành?|Hình luật|Hình thư|Quốc triều hình luật|Hoàng Việt luật lệ|C#Câu 3: Đâu là ngành kinh tế chính của nền văn minh Đại Việt?|Nông nghiệp|Thương nghiệp|Thủ công nghiệp|Lâm, ngư nghiệp|A#Câu 4: Triều đại nào mở đầu cho thời đại phong kiến độc lập của dân tộc ta?|Triều Tiền Lý|Triều Ngô|Triều Lê|Triều Nguyễn|B#Câu 5: Đến thời Lê sơ, Nho giáo|Bước đầu được du nhập vào Đại Việt|Được nâng lên địa vị độc tôn|Bị nhà nước phong kiến kìm hãm|Không còn phát triển như trước|B#Câu 6: Trong lịch sử dân tộc Việt Nam, khái niệm văn minh Đại Việt được hiểu là|Sáng tạo vật chất và tinh thần trong kỷ nguyên độc lập|Những công trình kiến trúc còn lưu giữ lại đến ngày nay|Những tác phẩm văn học chữ Hán được sáng tác thời Lý|Kho tàng tri thức quân sự được đúc rút trong chiến tranh|A#Câu 7: “Tam giáo đồng nguyên” là sự hòa hợp của của các tôn giáo|Phật giáo - Đạo giáo - Nho giáo|Phật giáo - Nho giáo - Thiên Chúa giáo|Phật giáo - Đạo giáo - Tín ngưỡng dân gian|Nho giáo - Phật giáo - Ấn Độ giáo|A#Câu 8: Nghệ thuật chạm khắc gỗ đá tiêu biểu, được UNESCO công nhận là di sản tư liệu thế giới là công trình nào?|Chùa Trấn Quốc|Tượng phật la hán chùa Tây Phương|82 bia tiến sĩ ở Văn Miếu|Bộ cửa gỗ chùa Phổ Minh|C#Câu 9: Nội dung nào sau đây là cơ sở quan trọng nhất dẫn đến sự hình thành và phát triển rực rỡ của văn minh Đại Việt?|Kế thừa các nền văn minh cổ đại|Nền độc lập, tự chủ của đất nước|Tiếp thu thành tựu văn minh Ấn Độ|Tiếp thu thành tựu văn minh Trung Hoa|B#Câu 10: Các xưởng thủ công của nhà nước dưới các triều đại phong kiến Việt Nam còn được gọi là|Cục bách tác|Quốc sử quán|Quốc tử giám|Hàn lâm viện|A#Câu 11: Trung tâm chính trị - văn hóa và đô thị lớn nhất Đại Việt thế kỷ X-XV được nhắc đến trong câu “thứ nhất Kinh kì, thứ nhì Phố Hiến” là|Phố Hiến|Thanh Hà|Thăng Long|Hội An|C#Câu 12: “Đời vua Thái Tổ, Thái Tông, thóc lúa đầy đồng, trâu chẳng buồn ăn” là câu ca dân gian nói về thời|Tiền Lê|Lý – Trần|Hồ|Lê sơ|D#Câu 13: Dân tộc có số dân ít nhất của Việt Nam hiện nay là|Brâu|Dao|Rag lai|Ơ Đu|D#Câu 14: Hiện nay ở Việt Nam có bao nhiêu dân tộc?|50 dân tộc|52 dân tộc|54 dân tộc|56 dân tộc|C#Câu 15: Thành phần dân tộc theo dân số ở Việt Nam hiện nay được chia thành|Dân tộc đa số và dân tộc thiểu số|Dân tộc sinh sống vùng đất liền|Dân tộc sinh sống vùng hải đảo|Dân tộc sinh sống vùng miền núi|A#Câu 16: Khái niệm “dân tộc” trong tiếng Việt hiện nay được sử dụng theo những nghĩa nào?|Dân tộc - quốc gia và dân tộc - tộc người|Dân tộc đa số và dân tộc thiểu số|Dân tộc miền núi và dân tộc đồng bằng|Dân tộc - tộc người và dân tộc - ngữ hệ|A#Câu 17: Hiện nay, ở Việt Nam có bao nhiêu nhóm ngôn ngữ?|Năm nhóm|Sáu nhóm|Bảy nhóm|Tám nhóm|D#Câu 18: Trong sản xuất nông nghiệp của dân tộc Kinh, hoạt động kinh tế chính là|canh tác lúa nước|chăn nuôi gia súc|nuôi trồng thủy sản|trồng cây lúa nương|A#Câu 19: Về thủ công nghiệp, sản phẩm của người Kinh rất đa dạng và tinh xảo, không những đáp ứng nhu cầu trong nước mà còn|xuất khẩu|nhập khẩu|giao lưu|biếu, tặng|A#Câu 20: Phong tục nào sau đây không phải là phong tục tập quán của người Kinh?|Phong tục tập quán về chu kì vòng đời|Phong tục tập quán về chu kì canh tác|Phong tục tập quán về chu kì thời gian|Phong tục điểu táng|D#Câu 21: Ở Việt Nam, những nghề thủ công ra đời sớm và phát triển mạnh ở các dân tộc thiểu số là|nghề dệt và nghề đan|nghề rèn, đúc và nghề mộc|nghề gốm và chạm khắc|nghề làm giấy và in ấn|A#Câu 22: Lễ hội của các dân tộc thiểu số ở Việt Nam chủ yếu được tổ chức với quy mô như thế nào?|Làng/bản và tộc người|Quốc gia và quốc tế|Làng/bản và quốc tế|Tộc người và quốc tế|A#Câu 21: Nhóm ngôn ngữ nào có nhiều dân tộc sử dụng nhất ở Việt Nam?|Môn - Khơ me|Việt - Mường|Mông - Dao|Hán - Tạng|A#Câu 22: Theo nghị định số 05/2011/NĐ - CP về công tác dân tộc, “Dân tộc đa số” phải có số dân chiếm bao nhiêu % tổng số dân?|Trên 40 %|Trên 50 %|Trên 60 %|50 %|B#Câu 23: Một trong những cơ sở dẫn đến sự hình thành khối đại đoàn kết dân tộc ở Việt Nam là|yêu cầu thống nhất các vùng lãnh thổ|yêu cầu tập trung lực lượng đấu tranh chống giặc ngoại xâm|tham vọng xâm lược và bành trướng lãnh thổ|nhu cầu mở rộng giao lưu buôn bán|B#Câu 24: Ngày nay, khối đại đoàn kết các dân tộc Việt Nam được tập trung trong tổ chức nào sau đây?|Hội Văn hóa Cứu quốc Việt Nam|Mặt trận Liên Việt|Mặt trận Tổ quốc Việt Nam|Đảng Cộng sản Việt Nam|C#Câu 25: Ba nguyên tắc của Đảng Cộng sản Việt Nam trong xây dựng và phát triển khối đại đoàn kết dân tộc hiện nay là|bình đẳng, tự quyết và tương trợ nhau cùng phát triển|đoàn kết, dân chủ và bình đẳng giữa các dân tộc|bình đẳng, chủ quyền và quyền tự quyết của mỗi dân tộc|đoàn kết, bình đẳng và tương trợ nhau cùng phát triển|D#Câu 26: Loại hình canh tác lúa nước đặc sắc của đồng bào dân tộc thiểu số ở các thung lũng chân núi hoặc sườn đồi, sườn núi là?|Canh tác nuơng rẫy|Ruộng bậc thang|Guồng dẫn nước|Mương máng tưới tiêu|B#Câu 27: Nghề thủ công truyền thống nổi tiếng ở Thành phố Huế quê hương em là|Làng gốm Bát Tràng|Làng hương Thủy Xuân|Tranh dân gian Đông Hồ|Dệt lụa Vạn Phúc|B#Câu 28: Áo bà ba là trang phục truyền thống của phụ nữ vùng nào của Việt Nam|Bắc Bộ|Nam Bộ|Trung Bộ|Toàn Việt Nam|B#Câu 29: Vì sao cư dân các dân tộc thiểu số ở miền núi (Việt Nam) chủ yếu đi bộ và vận chuyển đồ bằng gùi?|Địa hình phức tạp, độ dốc lớn, hẹp|Địa hình bằng phẵng, lộ xi măng|Địa hình phức tạp, độ dốc thấp, rộng|Có nhiều cây cối chặn các lối đi|A#Câu 30: Lễ hội cồng chiêng Tây nguyên là của các dân tộc nào?|Gia Rai, Ê Đê, Ba Na, Xơ Đăng, Brâu, Cơ Ho|Kinh, Hoa, Khơ me|Mông, Tày, Thái, Nùng|Tày, Sán Chỉ, Lô Lô, Chăm|A#Câu 31: Lễ hội sông nước nổi tiếng ở Thành phố Huế là|Festival|Cầu Ngư|Vật Làng Sình|Thả diều|B#Câu 32: Nhà sàn dài là của cư dân dân tộc|Kinh|Hoa|Chăm|Êđê|D#Câu 33: Một trong những cơ sở hình thành khối đại đoàn kết dân tộc Việt Nam là từ yêu cầu|Giúp đỡ, chia sẻ nhau trong cuộc sống|Tập hợp lực lượng đấu tranh chống ngoại xâm|Tập hợp chống thú dữ khi cuộc sống còn sơ khai|Chế tạo công cụ lao động trong sinh hoạt hàng ngày|B#Câu 34: Khối đoàn kết dân tộc Việt Nam đã được hình thành từ:|Thời dựng nước Văn Lang – Âu Lạc|Khi thắng lợi 1000 năm Bắc thuộc|Khi giành được nền độc lập tự chủ|Khi giặc phương Bắc sang xâm lược|A#Câu 35: Những nguyên tắc nào sau đây là quan điểm của Đảng Cộng Sản Việt Nam trong việc xây dựng và phát triển khối đại đoàn kết dân tộc?|Đoàn kết, bình đẳng và tương trợ cùng phát triển|Bình đẳng, hợp tác và giúp đỡ nhau cùng phát triển|Đoàn kết, giúp đỡ nhau để vượt qua mọi khó khăn|Hợp tác, tương trợ và giúp đỡ nhau trong cuộc sống|A#Câu 36: Mục tiêu của Đảng và Nhà nước ta trong chính sách phát triển kinh tế miền núi, vùng dân tộc thiểu số là:|Nhằm phát huy tiềm năng, thế mạnh của các dân tộc|Nhằm đưa kinh tế miền núi trở thành trung tâm của kinh tế cả nước|Nhanh chóng hội nhập với nền kinh tế khu vực và thế giới|Đảm bảo được nhu cầu tự cung, tự cấp của đồng bào dân tộc thiểu số|A#Câu 37: Nội dung nào sau đây không đúng với quan điểm của Đảng và Nhà nước Việt Nam về chính sách dân tộc hiện nay?|Nghiêm cấm mọi hành vi kỳ thị và chia rẽ các dân tộc|Các dân tộc có quyền dùng chữ viết và tiếng nói riêng|Các dân tộc có quyền gìn giữ bản sắc dân tộc mình|Nghiêm cấm mọi hình thức tổ chức sinh hoạt tín ngưỡng|D#Câu 38: Một trong những vai trò của khối đại đoàn kết dân tộc trong sự nghiệp xây dựng và bảo vệ Tổ quốc Việt Nam hiện nay là|Nâng cao vị thế quốc gia - dân tộc trên trường quốc tế|Tăng cường sức mạnh của lực lượng vũ trang, cơ giới|Huy động sức mạnh toàn dân thực hiện mục tiêu chung|Đã đẩy nhanh quá trình hội nhập quốc tế và khu vực|C#Câu 39: Một trong những điểm chung của các Mặt trận được Đảng Cộng sản Việt Nam thành lập từ tháng 2 năm 1930 đến nay là|Cơ quan lãnh đạo cao nhất của Đảng và Nhà nước|Đoàn kết toàn dân tộc để thực hiện mục tiêu chung|Thực hiện chức năng, nhiệm vụ của Bộ ngoại giao|Phân hóa để tiêu diệt những kẻ thù của cách mạng|B#Câu 40: Nội dung nào sau đây được quán triệt trong toàn Đảng, toàn quân, toàn dân nhằm xây dựng khối Đại đoàn kết dân tộc?|Bình đẳng, hợp tác và giúp đỡ nhau cùng phát triển|Đoàn kết, giúp đỡ nhau để vượt qua mọi khó khăn|Hợp tác, tương trợ và giúp đỡ nhau trong cuộc sống|Đoàn kết, bình đẳng và tương trợ để cùng phát triển|D#";

    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let canAnswer = true;

    // Hàm xáo trộn mảng (Fisher-Yates Shuffle)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        // 1. Tách dữ liệu và tạo đối tượng câu hỏi
        const tempQuestions = rawData.split('#').filter(item => item.trim() !== "");
        
        questions = tempQuestions.map(item => {
            const p = item.split('|');
            const originalOptions = [
                { text: p[1], id: 'A' },
                { text: p[2], id: 'B' },
                { text: p[3], id: 'C' },
                { text: p[4], id: 'D' }
            ];
            const correctLetter = p[5].trim().toUpperCase();
            const correctText = originalOptions.find(opt => opt.id === correctLetter).text;

            // 2. Xáo trộn các lựa chọn bên trong mỗi câu hỏi
            const shuffledOptions = shuffle([...originalOptions]);

            return {
                q: p[0],
                options: shuffledOptions,
                correctText: correctText // Lưu văn bản đáp án đúng thay vì chữ cái A,B,C,D
            };
        });

        // 3. Xáo trộn thứ tự các câu hỏi
        shuffle(questions);
        
        loadQuestion();
    }

    function loadQuestion() {
        canAnswer = true;
        const qData = questions[currentIdx];
        document.getElementById('progress').innerText = `Câu ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const labels = ['A', 'B', 'C', 'D'];
        qData.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${opt.text}`;
            btn.onclick = () => checkAnswer(opt.text, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedText, btn) {
        if (!canAnswer) return;
        canAnswer = false;

        const correctText = questions[currentIdx].correctText;
        const allBtns = document.querySelectorAll('.btn-option');
        
        if (selectedText === correctText) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = "Chính xác! ✨";
            document.getElementById('feedback').style.color = "#28a745";
            score++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = "Sai rồi!";
            document.getElementById('feedback').style.color = "#dc3545";
            // Hiển thị đáp án đúng
            allBtns.forEach(b => {
                if (b.innerText.includes(correctText)) b.classList.add('correct');
            });
        }
        
        document.getElementById('next-btn').style.display = "inline-block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-container').style.display = "none";
        const resScreen = document.getElementById('result-screen');
        resScreen.style.display = "block";
        document.getElementById('score-text').innerText = `Bạn đạt được: ${score} / ${questions.length} câu đúng`;
    }

    // Chạy khởi tạo
    initQuiz();
</script>

</body>
</html>
