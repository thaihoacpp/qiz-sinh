<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Sinh Học</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f0f2f5; }
        .quiz-card { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 550px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: #1c1e21; text-align: left; line-height: 1.5; }
        .options { display: grid; gap: 12px; }
        .btn-option { padding: 14px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; text-align: left; }
        .btn-option:hover { background: #f8f9fa; border-color: #007bff; }
        .btn-option.correct { background: #28a745 !important; color: white; border-color: #28a745; }
        .btn-option.wrong { background: #dc3545 !important; color: white; border-color: #dc3545; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 24px; }
        #next-btn { margin-top: 20px; padding: 12px 30px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; display: none; font-weight: bold; }
        #result-screen { display: none; }
        .progress-bar { font-size: 0.9rem; color: #65676b; margin-bottom: 15px; text-align: right; }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-card">
    <div id="question-container">
        <div class="progress-bar" id="progress"></div>
        <div class="question" id="question-text">Đang tải câu hỏi...</div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">Tiếp theo</button>
    </div>

    <div id="result-screen">
        <h2 style="color: #28a745;">Hoàn thành!</h2>
        <p id="score-text" style="font-size: 1.2rem; margin: 20px 0;"></p>
        <button onclick="location.reload()" style="padding: 10px 25px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px;">Làm lại bài mới</button>
    </div>
</div>

<script>
    // DỮ LIỆU GỐC - Dán tất cả câu hỏi trắc nghiệm của bạn vào đây
    const rawData = 'Câu 1: Một loài vi khuẩn có khả năng sử dụng nguồn H2S để cung cấp electronCâu 1: Một loài vi khuẩn có khả năng sử dụng nguồn H2S để cung cấp electron cho quá trình tổng hợp chất hữu cơ từ CO2. Đây là phương thức dinh dưỡng nào?|Quang tự dưỡng|Quang dị dưỡng|Hóa tự dưỡng|Hóa dị dưỡng|C#Câu 2: Tại sao ATP được coi là "đồng tiền năng lượng" nhưng không phải là nơi dự trữ năng lượng dài hạn của tế bào?|Do liên kết giữa các gốc phosphate rất kém bền vững|Do phân tử ATP có kích thước quá lớn|Do ATP dễ bị khuếch tán ra ngoài tế bào|Do tế bào không có cơ chế tái tổng hợp ATP|A#Câu 3: Khi nồng độ enzyme không đổi, nồng độ cơ chất tăng quá mức bão hòa thì tốc độ phản ứng sẽ:|Tiếp tục tăng tuyến tính|Không tăng thêm|Giảm dần|Đạt cực đại rồi giảm đột ngột|B#Câu 4: Một chất ức chế có cấu trúc tương tự như cơ chất và cạnh tranh với cơ chất để gắn vào trung tâm hoạt động được gọi là:|ức chế không cạnh tranh|ức chế cạnh tranh|ức chế ngược|ức chế dị lập thể|B#Câu 5: Trong quá trình chuyển hóa, năng lượng giải phóng từ các phản ứng phân giải được tích lũy chủ yếu dưới dạng:|Nhiệt năng|Điện năng|Hóa năng (ATP)|Quang năng|C#Câu 6: Nếu một tế bào động vật bị hỏng cơ chế kiểm soát tại điểm G1, điều gì có khả năng xảy ra cao nhất?|Tế bào sẽ lập tức chết|Tế bào không bao giờ bước vào pha S|Tế bào phân chia liên tục tạo thành khối u|Tế bào sẽ nhân đôi NST nhưng không phân chia nhân|C#Câu 7: Một nhà khoa học sử dụng hóa chất ức chế quá trình tổng hợp protein Tubulin. Tế bào này sẽ bị dừng lại ở pha nào của chu trình tế bào?|Pha S|Pha G2 (trước khi vào M)|Pha G1|Pha M (kì cuối)|B#Câu 8: Sự khác biệt cơ bản về chu trình tế bào giữa tế bào phôi sớm (phân chia rất nhanh) và tế bào trưởng thành là:|Tế bào phôi không có pha S|Tế bào phôi có pha G1 và G2 rất ngắn hoặc không có|Tế bào phôi không có pha M|Tế bào phôi có pha G0 kéo dài|B#Câu 9: Protein p53 được gọi là "người gác cổng của bộ gene". Nếu p53 phát hiện DNA bị tổn thương nặng không thể sửa chữa ở G1, nó sẽ:|Ép tế bào vào pha S ngay lập tức|Kích hoạt quá trình tự sát của tế bào (apoptosis)|Kích thích tế bào tăng kích thước|Chuyển tế bào sang pha G2|B#Câu 10: Trong một chu trình tế bào của người, thời gian dài nhất thường thuộc về:|Kì đầu|Kì giữa|Kì trung gian|Kì cuối|C#Câu 11: Giả sử một loài có 2n=8. Một tế bào của loài này đang ở kì sau của nguyên phân. Số tâm động và số chromatid lần lượt là:|8 và 16|16 và 16|16 và 0|8 và 0|C#Câu 12: Hóa chất Colchicine ức chế sự hình thành thoi phân bào. Nếu xử lý tế bào đang chuẩn bị nguyên phân bằng Colchicine, kết quả sẽ tạo ra tế bào có:|Số lượng NST giảm đi một nửa|Số lượng NST tăng gấp đôi (đa bội)|Hai nhân riêng biệt|Không có màng nhân|B#Câu 13: Sự phân chia tế bào chất ở tế bào thực vật diễn ra bằng cách hình thành vách ngăn từ trung tâm ra ngoài là do:|Có sự tham gia của vi sợi actin|Tế bào thực vật có thành cellulose cứng không thể thắt eo|Tế bào thực vật không có trung thể|Tế bào thực vật có không bào lớn|B#Câu 14: Trong nguyên phân, các nhiễm sắc thể kép tách nhau ra ở tâm động và di chuyển về hai cực là nhờ sự:|Co thắt của màng tế bào|Đẩy của các bào quan|Co rút của các sợi vi ống trong thoi phân bào|Áp suất thẩm thấu|C#Câu 15: Mục đích chính của việc các NST co xoắn cực đại ở kì giữa nguyên phân là:|Để dễ dàng nhân đôi DNA|Để thuận lợi cho việc phân ly NST mà không bị rối hoặc đứt gãy|Để tăng cường tổng hợp RNA|Để chuẩn bị cho quá trình trao đổi chéo|B#Câu 16: Một tế bào sinh dưỡng của loài A có 2n=24. Một tế bào sinh dục của loài này đang ở kì sau của giảm phân II. Số lượng NST đơn trong tế bào là:|12|24|48|6|B#Câu 17: Sự khác biệt bản chất giữa kì giữa I và kì giữa II trong giảm phân là:|Ở kì giữa I NST đơn xếp 1 hàng, kì giữa II NST kép xếp 2 hàng|Ở kì giữa I NST kép xếp 2 hàng, kì giữa II NST kép xếp 1 hàng|Ở kì giữa I có thoi phân bào, kì giữa II thì không|Ở kì giữa I màng nhân biến mất, kì giữa II màng nhân còn nguyên|B#Câu 18: Nếu sự không phân ly của cặp NST số 21 xảy ra trong Giảm phân I ở mẹ, kết hợp với tinh trùng bình thường sẽ tạo ra hợp tử gây hội chứng Down có bộ NST là:|2n-1|2n+1|2n+2|3n|B#Câu 19: Trao đổi chéo giữa các chromatid khác nguồn gốc trong cặp NST tương đồng diễn ra ở:|Kì trung gian|Kì đầu I|Kì đầu II|Kì giữa I|B#Câu 20: Tại sao giảm phân II được coi là có diễn biến tương tự nguyên phân nhưng bản chất lại khác?|Vì không có kì trung gian|Vì tế bào tham gia giảm phân II có bộ NST đơn bội kép (n kép)|Vì kết quả tạo ra 4 tế bào giống hệt nhau|Vì không có sự phân ly của tâm động|B#Câu 21: Kỹ thuật nào cho phép tạo ra các cây con có kiểu gene đồng nhất từ một mảnh mô của cây mẹ quý hiếm?|Lai tế bào sinh dưỡng|Nuôi cấy mô tế bào|Gây đột biến dòng tế bào|Cấy truyền phôi|B#Câu 22: Trong nhân bản vô tính cừu Dolly, con cừu con sinh ra có đặc điểm di truyền giống nhất với:|Con cừu cho trứng|Con cừu mang thai hộ|Con cừu cho nhân tế bào tuyến vú|Là sự pha trộn của cả ba con|C#Câu 23: Tại sao việc dung hợp tế bào trần (Somatic hybridization) lại vượt qua được rào cản cách ly giữa các loài?|Vì nó không cần dùng giao tử|Vì nó cho phép kết hợp toàn bộ bộ gene của hai loài khác xa nhau vào một tế bào|Vì nó sử dụng virus làm vector trung gian|Vì nó chỉ thực hiện ở thực vật|B#Câu 24: Tế bào gốc phôi (Embryonic stem cells) được đánh giá cao trong y học tái tạo vì chúng có tính:|Đơn năng|Đa năng giới hạn|Toàn năng (hoặc vạn năng)|Biệt hóa cao|C#Câu 25: Thành tựu nào sau đây không thuộc về công nghệ tế bào động vật?|Nhân bản vô tính lợn để lấy nội tạng ghép cho người|Liệu pháp tế bào gốc điều trị ung thư máu|Tạo giống lúa vàng có khả năng tổng hợp vitamin A|Cấy truyền phôi bò để tăng nhanh đàn gia súc|C#Câu 26: Vi khuẩn oxy hóa lưu huỳnh sống ở các miệng núi lửa dưới đáy biển thuộc nhóm vi sinh vật nào?|Quang tự dưỡng|Hóa tự dưỡng|Quang dị dưỡng|Hóa dị dưỡng|B#Câu 27: Một môi trường nuôi cấy chứa: 10g Glucose, 2g KH2 PO4, 0.5g MgSO4. Đây là loại môi trường:|Môi trường tự nhiên|Môi trường tổng hợp|Môi trường bán tổng hợp|Môi trường chọn lọc|B#Câu 28: Nhóm vi sinh vật nào có khả năng chịu được áp suất thẩm thấu cao (môi trường ưu trương)?|Vi sinh vật ưa ấm|Vi sinh vật ưa kiềm|Vi sinh vật ưa muối|Vi sinh vật ký sinh|C#Câu 29: Cấu trúc nào giúp vi khuẩn tồn tại qua điều kiện môi trường cực kỳ khắc nghiệt như thiếu dinh dưỡng, nhiệt độ cao?|Vỏ nhầy|Lông bơi|Nội bào tử (Endospore)|Thành tế bào|C#Câu 30: Khi nói về nuôi cấy không liên tục, quần thể vi sinh vật đạt số lượng tế bào tối đa và không đổi ở pha nào?|Pha tiềm phát|Pha lũy thừa|Pha cân bằng|Pha suy vong|C#Câu 31: Quá trình lên men khác với hô hấp hiếu khí ở điểm cơ bản nào?|Chỉ xảy ra ở vi khuẩn|Chất nhận electron cuối cùng là một phân tử hữu cơ nội sinh|Tạo ra nhiều ATP hơn|Luôn tạo ra khí CO2|B#Câu 32: Ứng dụng của quá trình phân giải polysaccharide của vi sinh vật trong đời sống là:|Sản xuất mì chính (bột ngọt)|Muối dưa, cà|Sản xuất ethanol sinh học từ rơm rạ|Làm sữa chua|C#Câu 33: Vi sinh vật phân giải protein từ xác động vật tạo ra sản phẩm chứa nitơ mà cây xanh có thể hấp thụ được là:|Khí N2|NH4+ và NO3-|Acid amin|Protein đơn giản|B#Câu 34: Trong sản xuất nước mắm, người ta lợi dụng quá trình phân giải của vi sinh vật đối với:|Tinh bột thành đường|Protein thành acid amin|Lipid thành acid béo|Cellulose thành glucose|B#Câu 35: Tại sao dưa muối sau một thời gian lại có vị chua?|Do đường trong rau biến thành acid acetic|Do vi khuẩn lactic chuyển hóa đường thành acid lactic|Do sự phân hủy của diệp lục|Do nấm men thực hiện lên men rượu|B#Câu 36: Thuốc trừ sâu sinh học Bt được sản xuất từ:|Virus gây bệnh cho sâu|Độc tố của vi khuẩn Bacillus thuringiensis|Nấm mốc ký sinh sâu|Chiết xuất từ cây thuốc phiện|B#Câu 37: Sản phẩm nào sau đây là thành tựu của công nghệ vi sinh vật trong y học nhằm điều trị bệnh tiểu đường?|Insulin tái tổ hợp|Kháng sinh Penicillin|Vaccine phòng dại|Vitamin B12|A#Câu 38: Vi sinh vật được sử dụng để làm sạch các vết dầu loang trên biển nhờ khả năng:|Hấp phụ dầu vào tế bào|Phân giải các hydrocarbon trong dầu|Làm dầu kết tủa xuống đáy|Ngăn cản dầu loang rộng|B#Câu 39: Việc sử dụng vi sinh vật trong sản xuất sinh khối (SCP - Single Cell Protein) có ưu điểm lớn nhất là:|Hương vị ngon hơn thịt|Tốc độ sinh trưởng nhanh, hàm lượng protein cao|Không cần thiết bị hiện đại|Dễ vận chuyển|B#Câu 40: Quy trình sản xuất biogas dựa trên hoạt động của nhóm vi sinh vật nào trong điều kiện kị khí?|Vi khuẩn lactic|Nấm men rượu|Vi khuẩn methane (Methanogens)|Tảo lục|C#Câu 41: Tại sao virus được coi là thực thể nằm ở "ngưỡng cửa của sự sống"?|Vì chúng có kích thước quá nhỏ|Vì chúng có thể kết tinh như chất vô cơ|Vì chúng chỉ có biểu hiện sống khi ký sinh nội bào bắt buộc|Vì chúng có cấu tạo tế bào đơn giản|C#Câu 42: Thành phần nào của virus quyết định tính đặc hiệu (chỉ tấn công được một số loại tế bào chủ nhất định)?|Lõi acid nucleic|Các gai glycoprotein trên vỏ ngoài hoặc vỏ capsid|Enzyme sao chép ngược|Đuôi của thực khuẩn thể|B#Câu 43: Điểm khác biệt cơ bản về hệ gene của virus so với tế bào sinh vật là:|Hệ gene của virus chỉ có DNA đơn|Hệ gene của virus luôn là RNA|Hệ gene của virus có thể là DNA hoặc RNA, đơn hoặc kép|Hệ gene của virus nằm trong nhân|C#Câu 44: Phage (Thực khuẩn thể) xâm nhập vào tế bào vi khuẩn bằng cách:|Thực bào|Dung hợp màng|Bơm lõi acid nucleic vào bên trong, để lại vỏ ngoài|Xâm nhập toàn bộ hạt virus|C#Câu 45: Capsomere là đơn vị cấu tạo nên thành phần nào?|Vỏ ngoài lipid|Vỏ Capsid|Lõi DNA|Đĩa nền|B#Câu 46: Tại sao virus cúm thường xuyên gây ra các đại dịch mới dù đã có vaccine?|Vì vaccine có chất lượng kém|Vì hệ gene của virus cúm (RNA) rất dễ bị đột biến và tái tổ hợp tạo biến chủng mới|Vì virus cúm tồn tại quá lâu trong môi trường|Vì con người không tiêm chủng đủ|B#Câu 47: Cơ chế tác động của interferon trong việc chống virus là:|Trực tiếp tiêu diệt các hạt virus tự do|Kích thích các tế bào xung quanh sản sinh protein ức chế sự nhân lên của virus|Ngăn chặn sự hấp phụ của virus|Phá hủy thụ thể của tế bào chủ|B#Câu 48: Bệnh nào sau đây không lây truyền qua đường hô hấp?|Cúm A/H5N1|SARS-CoV-2|Viêm gan B|Sởi|C#Câu 49: Mục đích chính của việc tiêm vaccine là:|Để tiêu diệt virus ngay khi nó xâm nhập|Kích thích cơ thể tạo ra trí nhớ miễn dịch (kháng thể và tế bào nhớ)|Làm sạch máu khỏi độc tố|Tăng cường sức mạnh cho hệ cơ bắp|B#Câu 50: Tại sao virus HIV lại gây suy giảm miễn dịch ở người?|Vì nó phá hủy các tế bào hồng cầu|Vì nó tiêu diệt các tế bào lympho T hỗ trợ (CD4+) - "nhạc trưởng" của hệ miễn dịch|Vì nó ngăn cản quá trình tạo máu ở tủy xương|Vì nó làm hỏng các hạch bạch huyết|B';

    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let canAnswer = true;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initQuiz() {
        // Tách câu hỏi dựa trên dấu # và loại bỏ khoảng trắng rỗng
        const temp = rawData.split('#').map(s => s.trim()).filter(s => s.length > 0);
        
        questions = temp.map(item => {
            const p = item.split('|');
            // p[0]: Câu hỏi, p[1-4]: Đáp án, p[5]: Đáp án đúng (A,B,C,D)
            const originalOptions = [
                { text: p[1], id: 'A' },
                { text: p[2], id: 'B' },
                { text: p[3], id: 'C' },
                { text: p[4], id: 'D' }
            ];
            
            const correctLetter = p[5].trim().toUpperCase();
            const correctText = originalOptions.find(opt => opt.id === correctLetter).text;

            return {
                q: p[0],
                options: shuffle([...originalOptions]),
                correctText: correctText
            };
        });

        shuffle(questions);
        loadQuestion();
    }

    function loadQuestion() {
        canAnswer = true;
        const qData = questions[currentIdx];
        document.getElementById('progress').innerText = `Câu ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const labels = ['A', 'B', 'C', 'D'];
        qData.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${opt.text}`;
            btn.onclick = () => checkAnswer(opt.text, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedText, btn) {
        if (!canAnswer) return;
        canAnswer = false;

        const correctText = questions[currentIdx].correctText;
        const allBtns = document.querySelectorAll('.btn-option');
        
        if (selectedText === correctText) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerText = "Chính xác! ✨";
            document.getElementById('feedback').style.color = "#28a745";
            score++;
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerText = "Sai rồi!";
            document.getElementById('feedback').style.color = "#dc3545";
            allBtns.forEach(b => {
                if (b.innerText.includes(correctText)) b.classList.add('correct');
            });
        }
        document.getElementById('next-btn').style.display = "inline-block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-container').style.display = "none";
        document.getElementById('result-screen').style.display = "block";
        document.getElementById('score-text').innerText = `Bạn đạt được: ${score} / ${questions.length} câu đúng`;
    }

    initQuiz();
</script>
</body>
</html>
