<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Sinh 10 - Giao Diện Mới</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #2ecc71;
            --wrong: #e74c3c;
            --text: #2c3e50;
            --bg: #f0f7f4;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        #progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        h1 { color: var(--text); font-size: 24px; margin-top: 0; }

        .score-box {
            background: #e8f5e9;
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
        }

        .question {
            font-size: 19px;
            font-weight: 700;
            color: #34495e;
            margin-bottom: 25px;
            line-height: 1.5;
            text-align: left;
        }

        #choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            #choices { grid-template-columns: 1fr; }
        }

        button {
            padding: 15px;
            border: 2px solid transparent;
            border-radius: 12px;
            background: white;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: block;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            background: #f1fcf5;
        }

        button.correct {
            background: var(--primary) !important;
            color: white !important;
            border-color: #1e8449 !important;
        }

        button.wrong {
            background: var(--wrong) !important;
            color: white !important;
            border-color: #c0392b !important;
        }

        .result-screen h2 { color: var(--primary); font-size: 28px; }
        .final-score { font-size: 40px; font-weight: 700; margin: 15px 0; }
        .restart-btn { background: var(--text); color: white; text-align: center; margin: 20px auto 0; width: 200px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📘 Quiz Sinh Học 10</h1>
    <div class="score-box" id="score">Điểm: 0</div>
    
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>

    <div id="quiz-content">
        <div class="question" id="question"></div>
        <div id="choices"></div>
    </div>
</div>

<script>
// ===== DỮ LIỆU GỐC (GIỮ NGUYÊN 100%) =====
let data = `Trình tự các pha trong chu kì tế bào là?|A.G1→G2→S→M|B.M→G1→S→G2|C.G1→S→G2→M|D.M→G1→G2→S|C#
Sự kiện nào sau đây diễn ra ở pha S của chu kì tế bào?|A.Tế bào ngừng sinh trưởng|B.DNA và NST nhân đôi|C.NST phân li|D.NST xếp hàng|B#
Trong chu kì tế bào, NST tồn tại ở trạng thái kép xuất hiện ở?|A.S,G2,kì đầu/kì giữa|B.S,G2,kì giữa/kì sau|C.S,G2,kì sau/kì cuối|D.S,G2,kì đầu/kì cuối|A#
Khi tế bào vượt qua điểm G1 sẽ chuyển sang?|A.Pha S|B.Pha G2|C.Pha M nhân|D.Pha M tb chất|A#
Trong nguyên phân, chromatid phân li ở?|A.Kì đầu|B.Kì giữa|C.Kì sau|D.Kì cuối|C#
Quan sát NST rõ nhất ở kì giữa vì?|A.Dãn xoắn cực đại|B.Đóng xoắn cực đại|C.Đã nhân đôi|D.Đã phân li|B#
Sự khác nhau phân chia tb chất do?|A.Lysosome|B.Trung thể|C.Lục lạp|D.Thành tế bào|D#
Cho các vai trò sau:
(1) Làm tăng số lượng tế bào giúp cơ thể đa bào sinh trưởng và phát triển.
(2) Giúp cơ thể đa bào tái sinh những mô hoặc cơ quan bị tổn thương.
(3) Là cơ chế sinh sản của nhiều sinh vật đơn bào.
(4) Là cơ chế sinh sản của nhiều loài sinh sản vô tính.
Số vai trò của quá trình nguyên phân là|A.1|B.2|C.3|D.4|D#
Giảm phân gồm?|A.1 nhân đôi + 2 phân bào|B.1 nhân đôi + 1 phân bào|C.2 nhân đôi + 2 phân bào|D.2 nhân đôi + 1 phân bào|A#
Giao tử có bộ NST?|A.n|B.2n|C.3n|D.4n|A#
Tiếp hợp và trao đổi chéo ở?|A.Kì đầu I|B.Kì giữa I|C.Kì đầu II|D.Kì giữa II|A#
Kì sau I và II giống nhau ở?|A.Tách chromatid|B.Xếp hàng|C.Di chuyển về cực|D.Tiếp hợp|C#
Nguyên phân và giảm phân giống nhau ở?|A.2 lần phân bào|B.1 lần nhân đôi|C.Tiếp hợp|D.Trao đổi chéo|B#
Giao tử là?|A.Tế bào n tham gia thụ tinh|B.Tế bào 2n|C.Phải giảm phân mới thụ tinh|D.2n rồi giảm phân|A#
1 tb sinh tinh tạo?|A.4|B.1|C.2|D.3|A#
1 tb sinh trứng tạo?|A.4 trứng|B.2 trứng|C.1 trứng + 3 thể cực|D.3 trứng|C#
AaBb tạo bao nhiêu giao tử?|A.1|B.2|C.4|D.3|C#
Ổn định NST nhờ?|A.Nguyên phân + giảm phân|B.Nguyên phân + thụ tinh|C.Giảm phân + thụ tinh|D.Cả 3|D#
Ngựa 64 × lừa 62 →?|A.62|B.64|C.63|D.126|C#
Kì giữa I vs II khác ở?|A.Sắp xếp NST|B.Trao đổi chéo|C.Phân li|D.Co xoắn|A#
Sự kiện nào sau đây không xảy ra ở kì đầu giảm phân I?|A.Trao đổi chéo|B.NST đơn nhân đôi|C.Màng nhân tiêu biến|D.Tiếp hợp NST|B#
Một tế bào lợn 2n=38, kì sau I có?|A.38 NST, 76 chromatid|B.38 NST, 0 chromatid|C.38 NST, 38 chromatid|D.76 NST, 76 chromatid|A#Tế bào 2n=46 nguyên phân, phát biểu sai?|A.Kì đầu 46 NST kép|B.Kì giữa 46 NST kép|C.Kì sau 92 NST kép|D.Kì cuối mỗi tb 46 NST đơn|C#4 tế bào nguyên phân 3 đợt →?|A.32|B.12|C.24|D.48|A#Quan sát thấy 19 NST kép → đang ở?|A.Kì đầu II giảm phân|B.Kì đầu nguyên phân|C.Kì đầu I giảm phân|D.Kì cuối II|A#Tinh trùng có 28 NST → cơ thể có?|A.14|B.28|C.42|D.56|D#20 tb sinh trứng →?|A.40 trứng|B.20 trứng + 60 thể cực|C.80 trứng|D.20 thể cực|B#Hoạt động quan trọng NST nguyên phân?|A.Nhân đôi + xoắn|B.Phân li đều|C.Nhân đôi + phân li|D.Xoắn + tháo|C#Công nghệ tế bào là?|A.Nuôi cấy mô|B.Công nghệ gen|C.PCR|D.CNSH|A#Tế bào gốc là?|A.Đã biệt hóa|B.Tủy xương|C.Có khả năng biệt hóa|D.Bạch cầu|C#Nguyên lí công nghệ tế bào?|A.Toàn năng|B.Biệt hóa|C.Phản biệt hóa|D.Cả 3|D#Phát biểu đúng?|A.Động vật toàn năng như nhau|B.Thực vật có phản biệt hóa|C.Động vật cao hơn thực vật|D.Mọi tb động vật phản biệt hóa|B#Giâm cành dựa vào?|A.Toàn năng|B.Biệt hóa|C.Phản biệt hóa|D.Cả 3|A#Cho các thành tựu sau:
(1) Tạo mô, cơ quan thay thế
(2) Tạo dòng tế bào và động vật chuyển gene
(3) Nhân bản vô tính ở động vật
Các thành tựu chính của công nghệ tế bào động vật gồm|A.(1)(2)|B.(1)(3)|C.(2)(3)|D.(1)(2)(3)|D#Giảm dần toàn năng?|A.Đỉnh→bên→mềm|B.Bên→đỉnh→mềm|C.Mềm→bên→đỉnh|D.Mềm→đỉnh→bên|A#Tăng dần toàn năng?|A.Phôi→cuống→cơ tim→mô cơ|B.Mô cơ→cơ tim→cuống→phôi|C.Mô cơ→cuống→cơ tim→phôi|D.Phôi→cơ tim→cuống→mô cơ|B#Sau G2 vào?|A.G1|B.S|C.M|D.G0|C#Ý nghĩa nguyên phân?|A.Chia nhân đều|B.Sao chép NST|C.Phân li cromatit|D.Chia tb chất|B#Trao đổi chéo ở?|A.Kì đầu I|B.Kì giữa I|C.Kì đầu II|D.Kì giữa II|A#Giảm phân xảy ra ở?|A.Sinh dưỡng|B.Giao tử|C.Sinh dục chín|D.Hợp tử|C#NST tách ở tâm động giảm phân?|A.Kì sau I|B.Kì sau II|C.Kì giữa I|D.Kì giữa II|B#Công nghệ tb thực vật?|A.Thụ phấn|B.Vi sinh|C.Nuôi cấy mô|D.Gieo hạt|C#Không phải thành tựu?|A.Nhân bản|B.Tế bào gốc|C.Gene|D.Lai tb|C#Tạo giống mang đặc điểm 2 loài?|A.Nhân bản|B.Nuôi cấy|C.Lai tb|D.Hạt phấn|C#Vi sinh vật là?|A.Kí sinh|B.Nhỏ, thấy bằng kính hiển vi|C.Đơn bào|D.Nhân sơ|B#Quang dị dưỡng?|A.Anh sáng + CO2|B.Anh sáng + hữu cơ|C.Vô cơ + CO2|D.Hữu cơ + hữu cơ|B#Không phải vi sinh?|A.VK|B.Nấm men|C.Tảo đơn bào|D.Cây rêu|D#Quan sát vi khuẩn sống?|A.Soi tươi|B.Nhuộm Gram|C.Hóa sinh|D.Di truyền|A`;

// ===== LOGIC CHƯƠNG TRÌNH =====
let questions = data.split("#").filter(x => x.trim());
let score = 0;
let total = questions.length;
let current = null;

function next(){
    if(questions.length === 0){
        showResult();
        return;
    }

    // Cập nhật thanh tiến độ
    let progress = ((total - questions.length) / total) * 100;
    document.getElementById("progress-bar").style.width = progress + "%";

    let rd = Math.floor(Math.random() * questions.length);
    current = questions[rd].split("|");
    questions.splice(rd,1);

    show();
}

function show(){
    // Hiển thị câu hỏi (giữ nguyên gốc)
    document.getElementById("question").innerHTML = current[0].replace(/\n/g, "<br>");

    let html = "";
    // Hiển thị 4 lựa chọn (giữ nguyên nội dung bao gồm cả A. B. C. D.)
    ["A","B","C","D"].forEach((c,i)=>{
        html += `<button onclick="check('${c}', this)">
            ${current[i+1]}
        </button>`;
    });

    document.getElementById("choices").innerHTML = html;
}

function check(ans, btn){
    let correct = current[5].trim();
    let buttons = document.querySelectorAll("#choices button");

    buttons.forEach(b => b.disabled = true);

    if(ans === correct){
        score++;
        btn.classList.add("correct");
    } else {
        btn.classList.add("wrong");
        buttons.forEach(b => {
            // Kiểm tra nút nào chứa đáp án đúng
            if(b.innerText.trim().startsWith(correct)){
                b.classList.add("correct");
            }
        });
    }

    document.getElementById("score").innerHTML = `Điểm: ${score} / ${total}`;
    setTimeout(next, 1000);
}

function showResult() {
    document.getElementById("progress-bar").style.width = "100%";
    let percent = Math.round((score / total) * 100);
    document.getElementById("quiz-content").innerHTML = `
        <div class="result-screen">
            <h2>🎉 Hoàn thành!</h2>
            <div class="final-score">${score} / ${total}</div>
            <p>Bạn đạt tỉ lệ chính xác: ${percent}%</p>
            <button class="restart-btn" onclick="location.reload()">Làm lại</button>
        </div>
    `;
}

// Bắt đầu
next();

</script>
</body>
</html>
