<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quiz Sinh 10</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    text-align: center;

}

.container {
    max-width: 600px;
    margin: auto;

    color: white;

}

}

<body>

<div class="container">
    <h1>📘 Quiz Sinh 10</h1>

    <div class="score" id="score">Điểm: 0</div>

    <div class="question" id="question"></div>

    <div id="choices"></div>

</div>

<script>

// ===== DATA (bạn paste full vào đây) =====
let data = `Trình tự các pha trong chu kì tế bào là?|A.G1→G2→S→M|B.M→G1→S→G2|C.G1→S→G2→M|D.M→G1→G2→S|C#

Kì sau I và II giống nhau ở?|A.Tách chromatid|B.Xếp hàng|C.Di chuyển về cực|D.Tiếp hợp|C#
Nguyên phân và giảm phân giống nhau ở?|A.2 lần phân bào|B.1 lần nhân đôi|C.Tiếp hợp|D.Trao đổi chéo|B#
Giao tử là?|A.Tế bào n tham gia thụ tinh|B.Tế bào 2n|C.Phải giảm phân mới thụ tinh|D.2n rồi giảm phân|A#
1 tb sinh tinh tạo?|A.4|B.1|C.2|D.3|A#
1 tb sinh trứng tạo?|A.4 trứng|B.2 trứng|C.1 trứng + 3 thể cực|D.3 trứng|C#
AaBb tạo bao nhiêu giao tử?|A.1|B.2|C.4|D.3|C#
Ổn định NST nhờ?|A.Nguyên phân + giảm phân|B.Nguyên phân + thụ tinh|C.Giảm phân + thụ tinh|D.Cả 3|D#
Ngựa 64 × lừa 62 →?|A.62|B.64|C.63|D.126|C#
Kì giữa I vs II khác ở?|A.Sắp xếp NST|B.Trao đổi chéo|C.Phân li|D.Co xoắn|A#
Sự kiện nào sau đây không xảy ra ở kì đầu giảm phân I?|A.Trao đổi chéo|B.NST đơn nhân đôi|C.Màng nhân tiêu biến|D.Tiếp hợp NST|B#
Một tế bào lợn 2n=38, kì sau I có?|A.38 NST, 76 chromatid|B.38 NST, 0 chromatid|C.38 NST, 38 chromatid|D.76 NST, 76 chromatid|A#Tế bào 2n=46 nguyên phân, phát biểu sai?|A.Kì đầu 46 NST kép|B.Kì giữa 46 NST kép|C.Kì sau 92 NST kép|D.Kì cuối mỗi tb 46 NST đơn|C#4 tế bào nguyên phân 3 đợt →?|A.32|B.12|C.24|D.48|A#Quan sát thấy 19 NST kép → đang ở?|A.Kì đầu II giảm phân|B.Kì đầu nguyên phân|C.Kì đầu I giảm phân|D.Kì cuối II|A#Tinh trùng có 28 NST → cơ thể có?|A.14|B.28|C.42|D.56|D#20 tb sinh trứng →?|A.40 trứng|B.20 trứng + 60 thể cực|C.80 trứng|D.20 thể cực|B#Hoạt động quan trọng NST nguyên phân?|A.Nhân đôi + xoắn|B.Phân li đều|C.Nhân đôi + phân li|D.Xoắn + tháo|C#Công nghệ tế bào là?|A.Nuôi cấy mô|B.Công nghệ gen|C.PCR|D.CNSH|A#Tế bào gốc là?|A.Đã biệt hóa|B.Tủy xương|C.Có khả năng biệt hóa|D.Bạch cầu|C#Nguyên lí công nghệ tế bào?|A.Toàn năng|B.Biệt hóa|C.Phản biệt hóa|D.Cả 3|D#Phát biểu đúng?|A.Động vật toàn năng như nhau|B.Thực vật có phản biệt hóa|C.Động vật cao hơn thực vật|D.Mọi tb động vật phản biệt hóa|B#Giâm cành dựa vào?|A.Toàn năng|B.Biệt hóa|C.Phản biệt hóa|D.Cả 3|A#Thành tựu công nghệ tb động vật?|A.(1)(2)|B.(1)(3)|C.(2)(3)|D.(1)(2)(3)|D#Giảm dần toàn năng?|A.Đỉnh→bên→mềm|B.Bên→đỉnh→mềm|C.Mềm→bên→đỉnh|D.Mềm→đỉnh→bên|A#Tăng dần toàn năng?|A.Phôi→cuống→cơ tim→mô cơ|B.Mô cơ→cơ tim→cuống→phôi|C.Mô cơ→cuống→cơ tim→phôi|D.Phôi→cơ tim→cuống→mô cơ|B#Sau G2 vào?|A.G1|B.S|C.M|D.G0|C#Ý nghĩa nguyên phân?|A.Chia nhân đều|B.Sao chép NST|C.Phân li cromatit|D.Chia tb chất|B#Trao đổi chéo ở?|A.Kì đầu I|B.Kì giữa I|C.Kì đầu II|D.Kì giữa II|A#Giảm phân xảy ra ở?|A.Sinh dưỡng|B.Giao tử|C.Sinh dục chín|D.Hợp tử|C#NST tách ở tâm động giảm phân?|A.Kì sau I|B.Kì sau II|C.Kì giữa I|D.Kì giữa II|B#Công nghệ tb thực vật?|A.Thụ phấn|B.Vi sinh|C.Nuôi cấy mô|D.Gieo hạt|C#Không phải thành tựu?|A.Nhân bản|B.Tế bào gốc|C.Gene|D.Lai tb|C#Tạo giống mang đặc điểm 2 loài?|A.Nhân bản|B.Nuôi cấy|C.Lai tb|D.Hạt phấn|C#Vi sinh vật là?|A.Kí sinh|B.Nhỏ, thấy bằng kính hiển vi|C.Đơn bào|D.Nhân sơ|B#Quang dị dưỡng?|A.Anh sáng + CO2|B.Anh sáng + hữu cơ|C.Vô cơ + CO2|D.Hữu cơ + hữu cơ|B#Không phải vi sinh?|A.VK|B.Nấm men|C.Tảo đơn bào|D.Cây rêu|D#Quan sát vi khuẩn sống?|A.Soi tươi|B.Nhuộm Gram|C.Hóa sinh|D.Di truyền|A`;

// ===== INIT =====
let questions = data.split("#").filter(x => x);
let score = 0;
let total = questions.length;
let current = null;

// ===== RANDOM + NEXT =====
function next(){
    if(questions.length === 0){
        document.getElementById("question").innerHTML = "🎉 Hoàn thành!";
        document.getElementById("choices").innerHTML = "";
        return;
    }

    let rd = Math.floor(Math.random() * questions.length);
    current = questions[rd].split("|");
    questions.splice(rd,1);

    show();
}

// ===== HIỂN THỊ =====
function show(){
    document.getElementById("question").innerHTML = current[0];

    let html = "";
    ["A","B","C","D"].forEach((c,i)=>{
        html += `<button onclick="check('${c}', this)">
            ${current[i+1]}
        </button>`;
    });

    document.getElementById("choices").innerHTML = html;
}

// ===== CHECK =====
function check(ans, btn){
    let correct = current[5];

    let buttons = document.querySelectorAll("button");

    buttons.forEach(b => b.disabled = true);

    if(ans === correct){
        score++;
        btn.classList.add("correct");
    } else {
        btn.classList.add("wrong");

        buttons.forEach(b=>{
            if(b.innerText.startsWith(correct)){
                b.classList.add("correct");
            }
        });
    }

    document.getElementById("score").innerHTML =
        `Điểm: ${score} / ${total}`;

    setTimeout(next, 800); // auto next
}

// start
next();

</script>

</body>
</html>
